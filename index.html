<html>
  <head>
    <title>Primeira experiência de RA usando Hiro como marcador e um modelo de cubo do A-frame</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style= "margin: 0px; overflow: hidden"> 
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-assets>
        <img id="img1" src="https://github.com/RetroKaribu/atelie12026/blob/e031929ba9c8d61ea3e7f66cc890f1afaa0d4d37/img1.jpg?raw=true">
      </a-assets>
      
      <a-marker present="hiro">
        <a-image src="#img1"></a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
